<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marks Calculator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #89f7fe, #66a6ff);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 20px;
        width: 380px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: #66a6ff;
        box-shadow: 0 0 5px rgba(102,166,255,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #66a6ff, #3f8efc);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .output {
        margin-top: 20px;
        padding: 15px;
        border-radius: 12px;
        background: rgba(255,255,255,0.8);
        text-align: left;
    }

    .highlight {
        color: #3f8efc;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <h2>📊 Marks Calculator</h2>

    <input type="text" id="name" placeholder="Enter Student Name">
    <input type="number" id="m1" placeholder="Enter Mark 1">
    <input type="number" id="m2" placeholder="Enter Mark 2">
    <input type="number" id="m3" placeholder="Enter Mark 3">

    <button onclick="calculate()">Calculate</button>

    <div class="output" id="output"></div>
</div>

<script>

function calculate() {

    // let variables
    let studentName = document.getElementById("name").value;
    let mark1 = Number(document.getElementById("m1").value);
    let mark2 = Number(document.getElementById("m2").value);
    let mark3 = Number(document.getElementById("m3").value);

    if (!studentName || !mark1 || !mark2 || !mark3) {
        alert("Please fill all fields!");
        return;
    }

    // arrow function (const)
    const calculateAverage = (m1, m2, m3) => (m1 + m2 + m3) / 3;

    let total = mark1 + mark2 + mark3;
    let average = calculateAverage(mark1, mark2, mark3).toFixed(2);

    // template literals
    document.getElementById("output").innerHTML = `
        <p>Student Name: <span class="highlight">${studentName}</span></p>
        <p>Total Marks: <span class="highlight">${total}</span></p>
        <p>Average Marks: <span class="highlight">${average}</span></p>
    `;
}

</script>

</body>
</html>
